<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV Builder PK – Access</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="logo">
        <i class="fas fa-file-alt"></i>
        <h1>CV Builder <span>PK</span></h1>
      </div>

      <div id="choiceBox">
        <button id="newBtn" class="btn btn-primary">NEW ACCOUNT</button>
        <button id="existingBtn" class="btn btn-outline" style="color:white; border-color:rgba(255,255,255,0.3);">ALREADY HAVE ACCOUNT</button>
      </div>

      <div id="passwordBox" style="display:none;">
        <div class="form-group">
          <input type="password" id="passwordInput" placeholder="Password (6-8 chars)" maxlength="8" minlength="6">
        </div>
        <button id="submitPassword" class="btn btn-primary">Continue</button>
        <p id="errorMsg" class="error-message"></p>
      </div>
    </div>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
